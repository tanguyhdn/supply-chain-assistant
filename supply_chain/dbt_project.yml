name: 'supply_chain'
version: '1.0.0'

profile: 'supply_chain'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  supply_chain:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  supply_chain:
    scms_deliveries:
      +column_types:
        id: string
        pq_number: string
        po_so_number: string
        asn_dn_number: string
        line_item_quantity: string
        line_item_value: string
        pack_price: string
        unit_price: string
        weight_kilograms: string
        freight_cost_usd: string
        line_item_insurance_usd: string